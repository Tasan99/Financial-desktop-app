<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Data Engine | Warwick v1.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar shadow-sm p-3">
                <div class="sticky-top">
                    <h5 class="text-primary fw-bold mb-4 border-bottom pb-2">Analysis Controls</h5>
                    
                    <div class="mb-4 p-3 border rounded bg-light shadow-sm">
                        <label class="small fw-bold text-muted mb-2">UPLOAD EXCEL DATA</label>
                        <input type="file" id="excelUpload" class="form-control form-control-sm" accept=".xlsx, .xls">
                    </div>

                    <label class="small fw-bold text-muted mb-1">SELECT ENTITY</label>
                    <select id="entitySelect" class="form-select mb-4 shadow-sm" disabled></select>
                    
                    <label class="small fw-bold text-muted mb-2">REPORTS</label>
                    <div class="d-grid gap-1">
                        <button class="btn btn-outline-dark btn-sm btn-report" onclick="loadReport('report1')" disabled>Income Statement</button>
                        <button class="btn btn-outline-dark btn-sm btn-report" onclick="loadReport('report2')" disabled>Monthly IS Trend</button>
                        <button class="btn btn-outline-dark btn-sm btn-report" onclick="loadReport('report4')" disabled>Regional Comparison</button>
                        <button class="btn btn-outline-dark btn-sm btn-report" onclick="loadReport('report5')" disabled>Operational Metrics</button>
                        <hr>
                        <button class="btn btn-outline-dark btn-sm btn-report" onclick="loadReport('report3')" disabled>Branch Rankings</button>
                    </div>

                    <div id="statusIndicator" class="text-center small py-3 mt-4">
                        <span class="badge bg-secondary">● Awaiting File...</span>
                    </div>
                </div>
            </div>

            <div class="col-md-9 p-4 content-area">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 id="reportTitle" class="fw-bold text-dark mb-0">Financial Summary</h4>
                    <span class="text-muted small">Warwick FinTech Project v1.0</span>
                </div>
                
                <div class="table-responsive shadow-sm bg-white p-2 rounded-3">
                    <div id="tableContainer">
                        <div class="text-center p-5 text-muted">
                            <h5>System Ready</h5>
                            <p>Please upload an Excel (.xlsx) file from the left panel to begin analysis.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
